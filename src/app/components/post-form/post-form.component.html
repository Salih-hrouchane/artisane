<div class="post-form" [class.focused]="isFocused">
  <div class="form-row">
    <!-- Avatar -->
    <div class="avatar avatar-md"
         [style.background]="currentUser?.avatarColor + '22'"
         [style.border]="'2px solid ' + currentUser?.avatarColor + '55'">
      @if (currentUser?.avatarUrl) {
        <img [src]="currentUser?.avatarUrl" [alt]="currentUser?.displayName" class="avatar-img">
      } @else {
        {{ currentUser?.avatarInitials }}
      }
    </div>

    <!-- Textarea -->
    <div class="form-body">
      <textarea
        class="post-textarea"
        [(ngModel)]="content"
        (focus)="isFocused = true"
        (keydown)="onKeyDown($event)"
        placeholder="Partagez votre création, technique ou savoir-faire… 🏺"
        [class.over-limit]="isOverLimit"
        rows="3"
        maxlength="300">
      </textarea>

      <!-- Image previews -->
      @if (selectedImages.length > 0) {
        <div class="image-preview-grid" [class.grid-1]="selectedImages.length === 1"
             [class.grid-2]="selectedImages.length === 2"
             [class.grid-3]="selectedImages.length === 3"
             [class.grid-4]="selectedImages.length === 4">
          @for (img of selectedImages; track $index) {
            <div class="preview-item">
              <img [src]="img.previewUrl" [alt]="'Image ' + ($index + 1)" class="preview-img">
              <button class="remove-img-btn" (click)="removeImage($index)" title="Supprimer">✕</button>
            </div>
          }
        </div>
      }

      <!-- Hidden file input -->
      <input
        #fileInput
        type="file"
        accept="image/*"
        multiple
        style="display:none"
        (change)="onFilesSelected($event)">

      <!-- Toolbar -->
      <div class="form-toolbar">
        <div class="toolbar-actions">
          <button class="toolbar-btn"
                  [class.active]="selectedImages.length > 0"
                  [disabled]="!canAddMoreImages"
                  (click)="triggerFileInput()"
                  [title]="canAddMoreImages ? 'Ajouter des photos (' + selectedImages.length + '/' + MAX_IMAGES + ')' : 'Maximum ' + MAX_IMAGES + ' photos'">
            📷
            @if (selectedImages.length > 0) {
              <span class="img-badge">{{ selectedImages.length }}</span>
            }
          </button>
          <button class="toolbar-btn" title="Vidéo">🎬</button>
          <button class="toolbar-btn" title="Emoji">😊</button>
          <button class="toolbar-btn" title="Hashtag">#</button>
        </div>

        <div class="toolbar-right">
          <!-- Progress ring + counter -->
          @if (content.length > 0) {
            <div class="char-counter">
              <svg class="ring" width="32" height="32" viewBox="0 0 32 32">
                <circle class="ring-bg" cx="16" cy="16" r="12" />
                <circle class="ring-fill"
                        cx="16" cy="16" r="12"
                        [style.stroke]="ringColor"
                        [style.stroke-dashoffset]="75.4 - (progress / 100) * 75.4" />
              </svg>
              @if (charsLeft <= 20) {
                <span class="chars-left" [class.danger]="isOverLimit">{{ charsLeft }}</span>
              }
            </div>
          }

          <button
            class="btn btn-primary submit-btn"
            [disabled]="isEmpty || isOverLimit || isSubmitting"
            (click)="submit()">
            @if (isSubmitting) {
              <span class="spinner">⟳</span>
            } @else {
              Publier
            }
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hint -->
  @if (isFocused) {
    <p class="hint">Ctrl+Entrée pour publier rapidement</p>
  }
</div>
